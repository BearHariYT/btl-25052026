<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Превью — локации и карточка PROMO | byteland</title>
	<link rel="stylesheet" href="assets/css/bootstrap.min.css">
	<link rel="stylesheet" href="assets/css/custom.css">
	<style>
		body { padding-top: 40px; padding-bottom: 80px; }

		/* ── Локации справа, SVG-флаги ── */
		.loc-row {
			display: flex;
			justify-content: flex-end;
			gap: 8px;
			flex-wrap: wrap;
			margin-bottom: 36px;
		}
		.loc-btn {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 8px 14px;
			background-color: var(--light-dark);
			border: 1px solid var(--light-dark);
			border-radius: 10px;
			cursor: pointer;
			transition: background-color 0.2s, border-color 0.2s;
			font-family: "Golos Text", sans-serif;
		}
		.loc-btn:hover { background-color: var(--dark); border-color: rgba(255,255,255,0.1); }
		.loc-btn.active { background-color: var(--blue); border-color: var(--blue); }
		.loc-flag-wrap {
			width: 34px; height: 34px;
			border-radius: 50%;
			background-color: var(--dark);
			display: flex; align-items: center; justify-content: center;
			flex-shrink: 0; overflow: hidden;
		}
		.loc-flag-wrap img { width: 22px; height: 22px; object-fit: contain; }
		.loc-btn.active .loc-flag-wrap { background-color: rgba(255,255,255,0.15); }
		.loc-info { display: flex; flex-direction: column; }
		.loc-name { font-size: 13px; font-weight: 600; color: var(--white); line-height: 1.2; }
		.loc-city { font-size: 11px; color: var(--gray); }
		.loc-btn.active .loc-city { color: rgba(255,255,255,0.6); }
		.loc-ping { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--green); margin-top: 2px; }
		.loc-btn.active .loc-ping { color: rgba(255,255,255,0.8); }
		.ping-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
		.loc-btn.active .ping-dot { background: rgba(255,255,255,0.8); }

		/* ── Бейджи дополнительных фич внутри оригинальной карточки ── */
		.plan-tags {
			display: flex;
			justify-content: center;
			gap: 6px;
			flex-wrap: wrap;
			margin-bottom: 16px;
		}
		.plan-tag {
			display: inline-flex;
			align-items: center;
			gap: 5px;
			padding: 4px 10px;
			background-color: var(--background);
			border: 1px solid rgba(255,255,255,0.08);
			border-radius: 6px;
			font-size: 12px;
			color: var(--gray);
			font-family: "Golos Text", sans-serif;
		}
		.plan-tag svg { flex-shrink: 0; }

		/* для сравнения */
		.compare-label {
			font-size: 11px; font-weight: 600; text-transform: uppercase;
			letter-spacing: 0.08em; color: var(--gray); margin-bottom: 14px;
		}
	</style>
</head>
<body>

	<!-- ЛОКАЦИИ СПРАВА -->
	<div class="loc-row">

<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/custom.js"></script>
<script>
	function switchLoc(btn) {
		document.querySelectorAll('.loc-btn').forEach(function(b) { b.classList.remove('active'); });
		btn.classList.add('active');
	}
</script>
</body>
</html>
